aid: chalmers-university-of-technology
name: Chalmers University of Technology
description: >-
  Chalmers University of Technology (Chalmers tekniska hogskola) is a private
  technical university in Gothenburg, Sweden, ranked #139 in the QS World
  University Rankings 2025. Its public, machine-readable footprint is centered
  on research information and library/repository services rather than a unified
  developer portal. Confirmed surfaces include the Chalmers Research API
  (api.research.chalmers.se), OAI-PMH metadata interfaces for the Chalmers
  Research portal and the Chalmers Open Digital Repository (ODR), and the
  Chalmers University Library GitHub organization hosting open-source data and
  metadata tooling. There is no single consolidated, self-service developer
  portal; access is API/repository specific.
