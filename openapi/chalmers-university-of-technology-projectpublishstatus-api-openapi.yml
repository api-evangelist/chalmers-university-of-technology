openapi: 3.0.3
info:
  title: ChalmersResearch ContractImport ProjectPublishStatus API
  version: v1
  description: Public API serving research information from the Chalmers Research portal, including research projects, publications, funders/organizations and collaborations. Converted from the live Swagger 2.0 description at https://api.research.chalmers.se/swagger/docs/v1.
servers:
- url: https://api.research.chalmers.se
tags:
- name: ProjectPublishStatus
paths:
  /api/ProjectPublishStatus:
    get:
      tags:
      - ProjectPublishStatus
      summary: "Returns the publish status for a given project. \r\n            1 - New, 2- Only visible for logged in users, 3 - Public"
      operationId: ProjectPublishStatus_Get
      deprecated: false
      parameters:
      - name: projectId
        in: query
        required: true
        description: ProjectID to retrieve publish status for
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                format: int32
                type: integer
            text/json:
              schema:
                format: int32
                type: integer
            application/xml:
              schema:
                format: int32
                type: integer
            text/xml:
              schema:
                format: int32
                type: integer
    put:
      tags:
      - ProjectPublishStatus
      summary: Not implemented
      operationId: ProjectPublishStatus_Put
      deprecated: false
      responses:
        '204':
          description: No Content
    post:
      tags:
      - ProjectPublishStatus
      summary: "Sets the publish status for a given project\r\n            1 - New, 2- Only visible for logged in users, 3 - Public"
      operationId: ProjectPublishStatus_Post
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
          text/json:
            schema:
              $ref: '#/components/schemas/Project'
          application/xml:
            schema:
              $ref: '#/components/schemas/Project'
          text/xml:
            schema:
              $ref: '#/components/schemas/Project'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Project'
        description: Project (PublishStatus) properties as JSON object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                format: int32
                type: integer
            text/json:
              schema:
                format: int32
                type: integer
            application/xml:
              schema:
                format: int32
                type: integer
            text/xml:
              schema:
                format: int32
                type: integer
    delete:
      tags:
      - ProjectPublishStatus
      summary: Not implemented
      operationId: ProjectPublishStatus_Delete
      deprecated: false
      parameters:
      - name: projectId
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: userId
        in: query
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '204':
          description: No Content
